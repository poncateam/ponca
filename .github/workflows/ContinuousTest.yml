name: Build and run tests

defaults:
  run:
    shell: bash

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Windows MSVC", os: windows-latest, cc: "cl.exe", cxx: "cl.exe", icon: "Windows"}
          - { name: "Ubuntu gcc", os: ubuntu-latest, cc: "gcc", cxx: "g++", icon: "Linux" }
          - { name: "MacOS clang", os: macos-latest, cc: "clang", cxx: "clang++", icon: "Apple" }
    steps:
      - uses: seanmiddleditch/gha-setup-ninja@master
      - name: Add msbuild to PATH
        uses: seanmiddleditch/gha-setup-vsdevenv@master
        if: runner.os == 'Windows'
      - name: Checkout remote head
        uses: actions/checkout@master
        with:
          path: src
      - name: cmake
        run: mkdir build && cd build && cmake ../src  -GNinja -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} -DCMAKE_C_COMPILER=${{ matrix.config.cc }} -DCMAKE_Fortran_COMPILER="" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../install -DPONCA_CONFIGURE_EXAMPLES=OFF -DPONCA_CONFIGURE_DOC=ON -DPONCA_CONFIGURE_TESTS=ON
      - name: make buildtests
        run: cd build && cmake --build . --target buildtests
      - name: make ContinuousTest
        run: cd build && cmake --build . --target test
      - name: Display test failure logs
        if: ${{ failure() }}
        run : cat ./build/Testing/Temporary/LastTest.log
      - name: Install PCL
        run: |
          sudo apt-get update && sudo apt-get install libpcl-dev
        if: runner.os == 'Linux'
      - name: reconfigure cmake with ponca-examples
        run: cd build && cmake ../src -DPONCA_CONFIGURE_EXAMPLES=ON
      - name: make ponca-examples
        run: cd build && cmake --build . --target ponca-examples
      - name: make install
        run: cd build && cmake --build . --target install

  prep-sycl-container:
    runs-on: "ubuntu-latest"
    permissions:
      packages: write
    outputs: 
      docker_image: ${{ steps.docker.outputs.docker_image }}
    
    steps:
      - uses: actions/checkout@master
      
      - uses: ./.github/workflows/create-adaptivecpp-container
        id: docker
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-sycl:
    runs-on: "ubuntu-latest"
    needs: prep-sycl-container
    container: 
      image: ${{ needs.prep-sycl-container.outputs.docker_image }}
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@master
      with:
        submodules: 'recursive'
        path: src
        
    - name: cmake
      run: mkdir build && cd build && cmake ../src  -GNinja -DCMAKE_Fortran_COMPILER="" -DCMAKE_BUILD_TYPE=Release -DPONCA_CONFIGURE_EXAMPLES=ON -DPONCA_CONFIGURE_DOC=OFF -DPONCA_CONFIGURE_TESTS=OFF
    
    - name: build
      run: cd build && cmake --build . --target ponca-examples