name: 'AdaptiveCpp-CI-Docker-Image'
description: 'Creates a docker image for adaptive cpp runs'
inputs:
  GITHUB_TOKEN:
    required: true
outputs:
  docker_image:
    description: "Docker image id"
    value: "ghcr.io/poncateam/ponca/adaptivecpp:latest"

runs:
  using: 'composite'
  steps:
    - name: Set up Docker buildX
      uses: docker/setup-buildx-action@master

    - name: Login to docker registry
      uses: docker/login-action@master
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Build and push docker image
      uses: docker/build-push-action@master
      with:
        file: .github/workflows/create-adaptivecpp-container/Adaptivecpp.dockerfile
        platforms: linux/amd64
        push: true
        tags: ghcr.io/poncateam/ponca/adaptivecpp:latest
        cache-from: type=registry,ref=ghcr.io/poncateam/ponca/adaptivecpp:latest
        cache-to: type=inline